query GetMarketStatistics($where: PropertiesBoolExp = {}) {
  properties(where: $where) {
    id
    title
    price
    areaSquareMeters
    type
    address
    status
    createdAt
    updatedAt
    tags
    bedroomCount
    bathroomCount
    floorCount
    landArea
    slug
    ratingScore
    ratingCount
    province {
      name
      slug
    }
    district {
      name
      slug
    }
    ward {
      name
      slug
    }
    userBySaleId {
      id
      fullName
      totalRate
      username
      avatar
      phoneNumber
    }
  }
}

query GetPropertyDetails(
  $where: PropertiesBoolExp = {}
  $offset: Int = 0
  $limit: Int = 5,
  $orderBy: [PropertiesOrderBy!]
) {
  properties(where: $where, limit: $limit,  offset: $offset, orderBy: $orderBy) {
    id
    title
    price
    areaSquareMeters
    bedroomCount
    bathroomCount
    type
    address
    slug
    status
    tags
    slug
    propertyImages {
      id
      imageUrl
    }
    street{
      name
      slug
      }
    province {
      name
      slug
    }
    district {
      name
      slug
    }
    ward {
      name
      slug
    }
    userBySaleId {
      id
      fullName
      avatar
      phoneNumber
      email
      averageRating
      totalRate
      username
    }
    area
    areaEachFloor
    completionLevel
    constructionArea
    floorCount
    hasAirConditioner
    hasElevator
    hasOwnerLiving
    isProject
    isWholeHouse
    kitchens
    landArea
    livingRooms
    otherRooms
    ratingCount
    ratingScore
    rawUsableArea
  }
}

query GetInvestmentData($budget_range_min: numeric!, $budget_range_max: numeric!) {
  properties(
    where: {
      price: { _gte: $budget_range_min, _lte: $budget_range_max }
      status: { _eq: "available" }
    }
    limit: 200
  ) {
    id
    title
    price
    areaSquareMeters
    type
    address
    status
    createdAt
    updatedAt
    tags
    bedroomCount
    bathroomCount
    slug
    floorCount
    landArea
    slug
    ratingScore
    ratingCount
    province {
      name
      slug
    }
    district {
      name
      slug
    }
    ward {
      name
      slug
    }
    userBySaleId {
      id
      fullName
      averageRating
      totalRate
      username
      avatar
      phoneNumber
    }
  }
}

query GetPropertySaleInfo($where: PropertiesBoolExp = {}) {
  properties(where: $where, limit: 1) {
    id
    title
    slug
    userBySaleId {
      id
      fullName
      avatar
      phoneNumber
      email
      averageRating
      totalRate
      username
      createdAt
      updatedAt
    }
  }
}

query FindNearbyProperties($where: PropertiesBoolExp = {}) {
  properties(where: $where) {
    id
    title
    price
    areaSquareMeters
    type
    address
    latitude
    longitude
    bedroomCount
    bathroomCount
    slug
    propertyImages {
      id
      imageUrl
    }
    district {
      name
    }
    userBySaleId {
      fullName
      phoneNumber
      email
      username
    }
  }
} 